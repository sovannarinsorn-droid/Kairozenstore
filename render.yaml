services:
  - type: web
    name: kairozen-smm-bot
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python main.py"
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: CAMRAPID_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
